<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Dipu 💛</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Floating Hearts */
.heart {
    position: absolute;
    color: #ff7aa2;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh); opacity: 1;}
    100% {transform: translateY(-10vh); opacity: 0;}
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: fadeIn 2s ease;
    z-index: 1;
}

h1 {
    text-align: center;
}

#text {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-line;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

button {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    background: #ff7aa2;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>For Dipu 😌</h1>

<div id="text"></div>

<button onclick="playMusic()">Play Music 🎶</button>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
// Typing Message
const message = `Happy Best Friend Day Dipu 💛

Honestly bolu toh mujhe samajh nahi aata kaise express karu...

Tu meri life ke un logon me se hai jinke saath sab kuch effortless lagta hai.

Na koi fake vibe, na koi formality… bas real.

Dipu, tu important hai 🙂  

Bas aise hi rehna — same vibe, same attitude 😌

— Tera permanent bakchod friend 😎`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 30);
    }
}
typeWriter();

// Music
function playMusic() {
    document.getElementById("music").play();
}

// Floating Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💛";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 10 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
